name: Daily AI post

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  create-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run new:ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          SITE_TOPIC: ${{ vars.SITE_TOPIC || 'Meo cong nghe va nang suat cho nguoi dung pho thong' }}
          SITE_LANGUAGE: vi
      - run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://example.com' }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add daily AI post"
          file_pattern: src/content/posts/*.md
