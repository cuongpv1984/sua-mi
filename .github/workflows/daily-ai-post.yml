name: Daily AI post

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  create-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run new:ai
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          SITE_TOPIC: ${{ vars.SITE_TOPIC || 'Meo cong nghe va nang suat cho nguoi dung pho thong' }}
          SITE_LANGUAGE: vi
      - run: npm run build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://example.com' }}
      - name: Commit new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/*.md
          if git diff --cached --quiet; then
            echo "No new post to commit."
            exit 0
          fi
          git commit -m "Add daily AI post"
          git push
